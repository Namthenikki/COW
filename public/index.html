<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06060f">
  <title>CoWatch — Watch YouTube Together in Perfect Sync</title>
  <meta name="description" content="Create a room, invite your partner, and watch YouTube together with 100% sync. Built-in video calling, live chat, and a beautiful experience.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="landing-page">
  <!-- Animated Background -->
  <div class="bg-animation">
    <canvas id="bg-canvas"></canvas>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-logo">
      <div class="logo-icon">▶</div>
      <span class="logo-name">CoWatch</span>
    </div>
    <h1>Watch Together, <span>Stay Connected</span></h1>
    <p>Create a private room, share the code, and watch YouTube ad-free in perfect sync with built-in video calling.</p>
    <div class="feature-pills">
      <span class="feature-pill"><i class="ph ph-shield-check"></i> 0 Ads</span>
      <span class="feature-pill"><i class="ph ph-arrows-clockwise"></i> 100% Sync</span>
      <span class="feature-pill"><i class="ph ph-video-camera"></i> Video Call</span>
      <span class="feature-pill"><i class="ph ph-google-logo"></i> YouTube Login</span>
      <span class="feature-pill"><i class="ph ph-chat-dots"></i> Live Chat</span>
    </div>
  </section>

  <!-- Main Card -->
  <div class="landing-card">
    <!-- Name Input -->
    <div class="name-section">
      <label>Your Name</label>
      <div class="input-group">
        <input type="text" id="name-input" placeholder="Enter your name..." maxlength="20" autofocus>
        <i class="ph ph-user"></i>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn-primary" id="create-room-btn">
        <i class="ph ph-plus-circle"></i>
        Create Room
      </button>

      <div class="action-divider">or</div>

      <button class="btn-secondary" id="show-join-btn">
        <i class="ph ph-sign-in"></i>
        Join a Room
      </button>
    </div>

    <!-- Join Room Section (hidden by default) -->
    <div class="join-section" id="join-section">
      <div class="input-group">
        <input type="text" id="room-code-input" placeholder="ENTER CODE" maxlength="8">
      </div>
      <button class="btn-join" id="join-room-btn">
        <i class="ph ph-arrow-right"></i>
        Join Room
      </button>
    </div>
  </div>

  <script src="/js/landing.js"></script>
</body>
</html>
